name: "dreamgrasp"
tag: "exp"
exp_root_dir: "outputs" 
seed: 0
use_timestamp: False
data_type: "multi-image-datamodule"
data:
  image_path: [../datasets/Objects_2/0/rgba_0.png, ../datasets/Objects_2/0/rgba_1.png] # change here for your custom data
  instance_mask_path: [../datasets/Objects_2/0/mask_0.npy, ../datasets/Objects_2/0/mask_1.npy] # change here for your custom data
  height: [128, 256, 512]
  width: [128, 256, 512]
  resolution_milestones: [200, 300]
  default_elevation_deg: [20.0, 20.0] # change here for your custom data
  default_azimuth_deg: [144.0, 216.0] # change here for your custom data
  default_camera_distance: [3.8, 3.8] # do not change here. we handle camera distance by mesh post process
  default_fovy_deg: 20.0
  random_camera:
    height: [64, 128, 256]
    width: [64, 128, 256]
    batch_size: [2, 2, 2]
    resolution_milestones: [200, 300]
    eval_height: 512
    eval_width: 512
    eval_batch_size: 1
    elevation_range: [-10, 80]
    azimuth_range: [-180, 180]
    camera_distance_range: [3.8, 3.8]
    fovy_range: [20.0, 20.0] # Zero123 has fixed fovy
    progressive_until: 0
    camera_perturb: 0.0
    center_perturb: 0.0
    up_perturb: 0.0
    light_position_perturb: 1.0
    light_distance_range: [7.5, 10.0]
    eval_elevation_deg: 15.0
    eval_camera_distance: 3.8
    eval_fovy_deg: 20.0
    light_sample_strategy: "dreamfusion"
    batch_uniform_azimuth: False
    n_val_views: 30
    n_test_views: 120
    n_test_azimuth: 30
    test_elevations: [-20, 5, 30, 55, 80]

system_type: "dreamgrasp-system"
system:
  geometry_type: "gaussian-splatting"
  geometry:
    position_lr: [0, 0.001, 0.00002, 800]
    scale_lr: [0, 0.01, 0.001, 800]
    feature_lr: 0.01
    opacity_lr: 0.05
    rotation_lr: 0.001
    densification_interval: 100
    prune_interval: 100
    opacity_reset_interval: 100000
    densify_from_iter: 0
    densify_until_iter: ${trainer.max_steps}
    prune_from_iter: 0
    prune_until_iter: ${trainer.max_steps}
    densify_grad_threshold: [2000, 0.1, 0.07, 2500]
    min_opac_prune: 0.005 
    split_thresh: 0.02 
    radii2d_thresh: 1000

    sphere: False

    init_num_pts: 4096
    pc_init_radius: 0.5
    opacity_init: 0.05
    max_num: 500000

    another_feature: True
    another_feature_dim: 3
    another_feature_lr: 0.01
    feature_similiarity_thld: 0.9

    remove_instances_outlier_from_iter: 1000
    remove_instances_outlier_until_iter: 9999999
    remove_instances_outlier_interval: 500
    cluster_eps: 0.04

  exporter_type: "gaussian-instance-mesh-exporter"

  renderer_type: "gsplat-unified"
  renderer:
    debug: false
    invert_bg_prob: 1.0

  material_type: "no-material" # unused
  material:
    n_output_dims: 0

  background_type: "solid-color-background" # unused

  zero123_guidance_type: "stable-zero123-multiview-guidance"
  zero123_guidance:
    pretrained_config: "./load/zero123/sd-objaverse-finetune-c_concat-256.yaml"
    pretrained_model_name_or_path: "./load/zero123/stable_zero123.ckpt"
    vram_O: ${not:${gt0:${system.freq.guidance_eval}}}
    cond_image_path: ${data.image_path}
    cond_elevation_deg: ${data.default_elevation_deg}
    cond_azimuth_deg: ${data.default_azimuth_deg}
    cond_camera_distance: ${data.default_camera_distance}
    guidance_scale: 3.0
    sds_weight_type: "angle" # angle, uniform
    dreamtime_periods: [0, 1000, 3000]

  sds_guidance_type: "stable-diffusion-guidance-modified"
  sds_guidance:
    pretrained_model_name_or_path: "OFA-Sys/small-stable-diffusion-v0" #stabilityai/stable-diffusion-2-1-base OFA-Sys/small-stable-diffusion-v0
    guidance_scale: 10.
    weighting_strategy: sds
    dreamtime_periods: [0, 1000, 3000]

  prompt_processor_type: "stable-diffusion-multi-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "OFA-Sys/small-stable-diffusion-v0" #stabilityai/stable-diffusion-2-1-base OFA-Sys/small-stable-diffusion-v0
    prompt_path: "../datasets/Objects_2/0/prompts.txt" # change here for your custom data
    prefix: "an image of a single "

  freq:
    ref_only_steps: 0
    guidance_eval: 0
    zero123_start_iter: 0
    zero123_end_iter: 99999
    segmentation_start_iter: 1000
    sds_start_iter: 1000
    alter_after_seg: True
    instance_viewpose_update_iter: 100

  loggers:
    wandb:
      enable: False
      project: "dreamgrasp"
      name: feature-ss

  loss:
    lambda_zero123: 0.1
    lambda_rgb: [100, 500., 1000., 400]
    lambda_instancewise_rgb: 1000.
    lambda_mask: 100.
    lambda_normal_smooth: [100, 7.0, 5.0, 150, 10.0, 200]
    lambda_mask_contrast: [500, 0.0, 1000., 501]
    lambda_feature_gradient: [500, 0.0, 0.0001, 501]
    lambda_spatial_similarity: 0.
    lambda_sds: [1000, 0.1, 0.01, 1100]
    lambda_opacity: 0.

  optimizer:
    name: Adam
    args:
      lr: 0.01
      betas: [0.9, 0.99]
      eps: 1.e-8
    params:
      background:
        lr: 0.001

trainer:
  max_steps: 3000
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  val_check_interval: 100
  enable_progress_bar: true
  precision: 32

checkpoint:
  save_last: False # save at each validation time
  save_top_k: -1
  every_n_train_steps: 1000
